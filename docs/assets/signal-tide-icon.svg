<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2" />
      <stop offset="50%" stop-color="#5d9cec" />
      <stop offset="100%" stop-color="#3a7bd5" />
    </linearGradient>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#3a7bd5" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="100" cy="100" r="90" fill="url(#circleGradient)" opacity="0.9"/>
  
  <!-- 波形图案 -->
  <path d="M 20,100 
           C 40,80 60,120 80,100
           C 100,80 120,120 140,100
           C 160,80 180,120 200,100" 
        stroke="#ffffff" 
        stroke-width="8" 
        fill="none"
        stroke-linecap="round"/>
  
  <!-- 第二个波形 -->
  <path d="M 10,130 
           C 30,110 50,150 70,130
           C 90,110 110,150 130,130
           C 150,110 170,150 190,130" 
        stroke="#ffffff" 
        stroke-width="6" 
        fill="none"
        stroke-linecap="round"
        opacity="0.8"/>
  
  <!-- 第三个波形 -->
  <path d="M 30,70 
           C 50,50 70,90 90,70
           C 110,50 130,90 150,70
           C 170,50 190,90 210,70" 
        stroke="#ffffff" 
        stroke-width="4" 
        fill="none"
        stroke-linecap="round"
        opacity="0.6"/>
  
  <!-- 中心的 "ST" 字母 -->
  <g transform="translate(100, 100)">
    <!-- S 字母 -->
    <path d="M -25,-20 
             Q -25,-10 -15,-10
             Q -5,-10 -5,0
             Q -5,10 5,10
             Q 15,10 15,20" 
          stroke="#ffffff" 
          stroke-width="6" 
          fill="none"
          stroke-linecap="round"/>
    
    <!-- T 字母 -->
    <path d="M 10,-25 L 10,25" 
          stroke="#ffffff" 
          stroke-width="6" 
          stroke-linecap="round"/>
    <path d="M -5,-25 L 25,-25" 
          stroke="#ffffff" 
          stroke-width="6" 
          stroke-linecap="round"/>
  </g>
  
  <!-- 外圈装饰 -->
  <circle cx="100" cy="100" r="95" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5"/>
</svg>