<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 极简线条版本 -->
  
  <!-- 主波形 - 粗线 -->
  <path d="M 40,100 
           C 60,70 80,130 100,100
           C 120,70 140,130 160,100" 
        stroke="#000" 
        stroke-width="4" 
        fill="none"
        stroke-linecap="round"/>
  
  <!-- 简洁的 "ST" 组合 -->
  <g transform="translate(100, 140)" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- S -->
    <path d="M -25,0 
             Q -25,10 -15,10
             Q -5,10 -5,0
             Q -5,-10 5,-10
             Q 15,-10 15,0"/>
    
    <!-- T -->
    <g transform="translate(25, 0)">
      <path d="M 0,-15 L 0,15"/>
      <path d="M -8,-15 L 8,-15"/>
    </g>
  </g>
</svg>