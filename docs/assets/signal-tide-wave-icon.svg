<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 纯波形抽象图标 -->
  
  <!-- 三层重叠波形 -->
  <g stroke="#000" fill="none" stroke-linecap="round">
    <!-- 底层波形 - 细 -->
    <path d="M 20,100 
             C 40,60 60,140 80,100
             C 100,60 120,140 140,100
             C 160,60 180,140 200,100" 
          stroke-width="2" 
          opacity="0.3"/>
    
    <!-- 中层波形 - 中 -->
    <path d="M 30,100 
             C 50,70 70,130 90,100
             C 110,70 130,130 150,100
             C 170,70 190,130 210,100" 
          stroke-width="3" 
          opacity="0.6"/>
    
    <!-- 顶层波形 - 粗 -->
    <path d="M 40,100 
             C 60,80 80,120 100,100
             C 120,80 140,120 160,100
             C 180,80 200,120 220,100" 
          stroke-width="4"/>
  </g>
  
  <!-- 中心交汇点 -->
  <circle cx="100" cy="100" r="2" fill="#000"/>
</svg>